services:
  - type: web
    name: praxa-control-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render genera uno seguro automáticamente
      - key: SCADA_KEY
        sync: false                # Lo pones manualmente en el dashboard de Render
      - key: EMPRESA_ID
        sync: false                # Ej: "manufactura_tj"
      - key: ENV
        value: production
